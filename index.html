<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>한국 어디게임</title>
  <script>
    window.navermap_authFailure = function () {
      var b = document.getElementById("msg");
      if(!b) return alert("인증 실패: Client ID/도메인 확인");
      b.textContent = "❌ 인증 실패: Client ID 또는 등록 도메인을 확인하세요.";
      b.style.background = "#c0392b"; b.style.display = "block";
    };
  </script>
  <!-- ① YOUR_CLIENT_ID 를 네이버 Client ID로 바꾸세요 -->
  <script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=e81jlmya8c&submodules=panorama"></script>
  <!-- Supabase 라이브러리 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin:0; height:100%; font-family:-apple-system,"Malgun Gothic",sans-serif; }
    #pano { width:100%; height:100vh; background:#111; }
    #hud { position:fixed; top:10px; left:10px; right:10px; z-index:30;
      display:flex; justify-content:space-between; gap:8px; pointer-events:none; }
    .pill { background:rgba(17,24,39,.85); color:#fff; padding:8px 14px; border-radius:999px;
      font-size:15px; font-weight:bold; box-shadow:0 2px 8px rgba(0,0,0,.3); }
    #msg { position:fixed; top:56px; left:50%; transform:translateX(-50%); z-index:30;
      max-width:92vw; display:none; background:#27ae60; color:#fff; padding:10px 16px;
      border-radius:10px; font-size:15px; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,.35); }
    #panel { position:fixed; right:10px; bottom:10px; z-index:30; width:min(360px,82vw); transition:width .2s; }
    #panel.big { width:min(760px,94vw); }
    #maptop { display:flex; justify-content:flex-end; margin-bottom:6px; }
    #expandBtn { pointer-events:auto; border:0; cursor:pointer; background:rgba(17,24,39,.85);
      color:#fff; padding:6px 10px; border-radius:8px; font-size:13px; }
    #guessMap { width:100%; height:230px; border-radius:12px; overflow:hidden;
      box-shadow:0 3px 14px rgba(0,0,0,.45); transition:height .2s; }
    #panel.big #guessMap { height:min(64vh,540px); }
    #actBtn { width:100%; margin-top:8px; padding:13px; border:0; border-radius:12px;
      background:#2563eb; color:#fff; font-size:16px; font-weight:bold; cursor:pointer;
      box-shadow:0 2px 8px rgba(0,0,0,.35); }
    #actBtn:disabled { background:#94a3b8; cursor:default; }
    .overlay { position:fixed; inset:0; z-index:50; display:flex; flex-direction:column;
      align-items:center; justify-content:center; padding:24px; text-align:center;
      background:rgba(15,23,42,.94); color:#fff; }
    .card { width:100%; max-width:420px; }
    .card h1 { margin:0 0 4px; font-size:28px; }
    .card p { margin:0 0 18px; color:#cbd5e1; font-size:14px; }
    .seg { display:flex; gap:6px; background:rgba(255,255,255,.08); padding:5px;
      border-radius:12px; margin-bottom:12px; }
    .seg button { flex:1; padding:11px; border:0; border-radius:9px; cursor:pointer;
      background:transparent; color:#cbd5e1; font-size:15px; font-weight:bold; }
    .seg button.on { background:#2563eb; color:#fff; }
    select, #nickInput { width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:0; font-size:16px; }
    .bigBtn { width:100%; padding:15px; border:0; border-radius:12px; cursor:pointer;
      background:#22c55e; color:#08301a; font-size:18px; font-weight:800; }
    .bigBtn:disabled { background:#94a3b8; color:#eee; cursor:default; }
    .credit { margin-top:14px; font-size:11px; color:#64748b; }
    #final .total { font-size:46px; font-weight:800; color:#fbbf24; margin:6px 0 14px; }
    #final ul { list-style:none; padding:0; margin:0 0 16px; width:100%; }
    #final li { display:flex; justify-content:space-between; padding:8px 12px;
      border-bottom:1px solid rgba(255,255,255,.12); font-size:15px; }
    #final li .d { color:#94a3b8; font-size:13px; }
    @media (max-width:640px){ .pill{ font-size:13px; padding:7px 11px; } }
  </style>
</head>
<body>
  <div id="pano"></div>
  <div id="hud">
    <div class="pill" id="roundPill">라운드 1 / 7</div>
    <div class="pill" id="scorePill">총점 0</div>
  </div>
  <div id="msg"></div>

  <div id="panel">
    <div id="maptop"><button id="expandBtn">⤢ 크게</button></div>
    <div id="guessMap"></div>
    <button id="actBtn" disabled>찾는 중…</button>
  </div>

  <div id="start" class="overlay">
    <div class="card">
      <h1>🗺️ 한국 어디게임</h1>
      <p>거리뷰를 보고 지도에서 위치를 맞혀보세요 · 7라운드</p>
      <div class="seg" id="seg">
        <button data-lv="all" class="on">전국</button>
        <button data-lv="sido">광역</button>
        <button data-lv="sigungu">기초</button>
      </div>
      <select id="provSel" style="display:none"></select>
      <select id="muniSel" style="display:none"></select>
      <button id="startBtn" class="bigBtn">불러오는 중…</button>
      <div class="credit">행정경계 데이터: 통계청(KOSTAT) · southkorea-maps (CC BY 4.0)</div>
    </div>
  </div>

  <div id="final" class="overlay" style="display:none">
    <div class="card">
      <h1>🏁 게임 끝!</h1>
      <div class="total" id="finalTotal">0</div>
      <ul id="finalList"></ul>
      <input id="nickInput" placeholder="닉네임 (최대 20자)" maxlength="20" />
      <button id="submitBtn" class="bigBtn" style="background:#2563eb;color:#fff;margin-bottom:8px">🏆 랭킹에 등록</button>
      <div id="submitMsg" style="font-size:13px;color:#cbd5e1;min-height:18px;margin-bottom:12px"></div>
      <button id="againBtn" class="bigBtn">지역 다시 고르기</button>
    </div>
  </div>

  <script>
    // ===== 게임 설정 =====
    var ROUNDS_TOTAL=7, MAX_SCORE=5000, FULL_RADIUS_KM=0.5, SHARPNESS=5, TRIES_MAX=80;
    var CUTOFF_FRAC=0.7;
    var cutoffKm=250;

    // ===== ② Supabase 연결: 아래 두 값을 내 것으로 바꾸세요 =====
    var SUPABASE_URL = "https://oimlnjlecmukjjdgaybz.supabase.co";
    var SUPABASE_KEY = "sb_publishable_AW7KZXMx3_5VtG02YSHzfw_-CUevn70";
    // =====================================================
    var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    var DATA=null, activeFeatures=[], activeBBox=null, activeName="전국";
    var roundPill=document.getElementById("roundPill"), scorePill=document.getElementById("scorePill");
    var msg=document.getElementById("msg"), act=document.getElementById("actBtn");
    var round=0, total=0, results=[], tries=0, phase="IDLE";
    var answerCoord=null, guessLatLng=null, guessMarker=null, answerMarker=null, line=null;

    function fmtNum(n){ return n.toLocaleString("ko-KR"); }
    function fmtDist(km){ return km<1 ? Math.round(km*1000)+"m" : km.toFixed(1)+"km"; }

    // ISO 주차 → "2026-W29"
    function isoWeek(d){
      d=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
      var day=d.getUTCDay()||7; d.setUTCDate(d.getUTCDate()+4-day);
      var ys=new Date(Date.UTC(d.getUTCFullYear(),0,1));
      var w=Math.ceil((((d-ys)/86400000)+1)/7);
      return d.getUTCFullYear()+"-W"+String(w).padStart(2,"0");
    }

    function pointInGeom(lng,lat,geom){
      function inPoly(poly){
        var inside=false;
        for(var r=0;r<poly.length;r++){
          var ring=poly[r], n=ring.length;
          for(var i=0,j=n-1;i<n;j=i++){
            var xi=ring[i][0],yi=ring[i][1],xj=ring[j][0],yj=ring[j][1];
            if(((yi>lat)!==(yj>lat)) && (lng < (xj-xi)*(lat-yi)/((yj-yi)||1e-12)+xi)) inside=!inside;
          }
        }
        return inside;
      }
      var polys = geom.type==="MultiPolygon" ? geom.coordinates : [geom.coordinates];
      for(var k=0;k<polys.length;k++) if(inPoly(polys[k])) return true;
      return false;
    }
    function combinedBBox(feats){
      var b=[Infinity,Infinity,-Infinity,-Infinity];
      feats.forEach(function(f){
        b[0]=Math.min(b[0],f.bbox[0]); b[1]=Math.min(b[1],f.bbox[1]);
        b[2]=Math.max(b[2],f.bbox[2]); b[3]=Math.max(b[3],f.bbox[3]);
      });
      return b;
    }
    function randomInRegion(){
      for(var t=0;t<500;t++){
        var lng=activeBBox[0]+Math.random()*(activeBBox[2]-activeBBox[0]);
        var lat=activeBBox[1]+Math.random()*(activeBBox[3]-activeBBox[1]);
        for(var i=0;i<activeFeatures.length;i++){
          var b=activeFeatures[i].bbox;
          if(lng>=b[0]&&lng<=b[2]&&lat>=b[1]&&lat<=b[3] && pointInGeom(lng,lat,activeFeatures[i].geometry))
            return new naver.maps.LatLng(lat,lng);
        }
      }
      return new naver.maps.LatLng((activeBBox[1]+activeBBox[3])/2,(activeBBox[0]+activeBBox[2])/2);
    }
    function scoreFor(km){
      if(km<=FULL_RADIUS_KM) return MAX_SCORE;
      if(km>=cutoffKm) return 0;
      var t=(cutoffKm-km)/(cutoffKm-FULL_RADIUS_KM);
      return Math.round(MAX_SCORE*Math.pow(t,SHARPNESS));
    }
    function haversineKm(a,b){
      var R=6371,r=Math.PI/180;
      var dLat=(b.lat()-a.lat())*r,dLng=(b.lng()-a.lng())*r;
      var la1=a.lat()*r,la2=b.lat()*r;
      var h=Math.sin(dLat/2)**2+Math.cos(la1)*Math.cos(la2)*Math.sin(dLng/2)**2;
      return 2*R*Math.asin(Math.sqrt(h));
    }

    var guessMap=new naver.maps.Map("guessMap",{ center:new naver.maps.LatLng(36.5,127.8), zoom:6 });
    function labelMarker(pos,text,color){
      return new naver.maps.Marker({ position:pos, map:guessMap, icon:{
        content:'<div style="transform:translate(-50%,-100%);background:'+color+
          ';color:#fff;padding:3px 8px;border-radius:8px;font-size:12px;font-weight:bold;'+
          'white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.5)">'+text+'</div>',
        anchor:new naver.maps.Point(0,0) } });
    }
    function clearOverlays(){
      [guessMarker,answerMarker,line].forEach(function(o){ if(o) o.setMap(null); });
      guessMarker=answerMarker=line=null;
    }

    var pano=new naver.maps.Panorama("pano",{ position:new naver.maps.LatLng(37.57,126.98), pov:{pan:0,tilt:0,fov:100} });

    function regionBounds(){
      return new naver.maps.LatLngBounds(
        new naver.maps.LatLng(activeBBox[1],activeBBox[0]),
        new naver.maps.LatLng(activeBBox[3],activeBBox[2]));
    }
    function beginSearch(){
      phase="SEARCHING"; tries=0; clearOverlays(); guessLatLng=null; answerCoord=null;
      guessMap.fitBounds(regionBounds());
      msg.style.display="none";
      act.disabled=true; act.textContent="찾는 중…";
      roundPill.textContent=activeName+" · 라운드 "+round+" / "+ROUNDS_TOTAL;
      tryFind();
    }
    function tryFind(){ tries++; act.textContent="찾는 중… ("+tries+")"; pano.setPosition(randomInRegion()); }
    function startGuessing(){ phase="GUESSING"; act.textContent="📍 여기 찍기"; act.disabled=true; }
    function reveal(){
      if(!guessLatLng) return;
      var km=haversineKm(guessLatLng,answerCoord), sc=scoreFor(km); total+=sc;
      var loc=pano.getLocation(), where=loc.address||loc.title||"주소 정보 없음";
      results.push({km:km,score:sc});
      answerMarker=labelMarker(answerCoord,"정답","#e11d48");
      if(!guessMarker) guessMarker=labelMarker(guessLatLng,"내 추측","#2563eb");
      line=new naver.maps.Polyline({ map:guessMap, path:[guessLatLng,answerCoord],
        strokeColor:"#e11d48", strokeWeight:3, strokeStyle:"shortdash" });
      guessMap.fitBounds(new naver.maps.LatLngBounds(guessLatLng,answerCoord));
      scorePill.textContent="총점 "+fmtNum(total);
      msg.style.background="#27ae60";
      msg.textContent="📏 "+fmtDist(km)+" · ⭐ "+fmtNum(sc)+"점 · "+where;
      msg.style.display="block";
      phase="REVEALED"; act.disabled=false;
      act.textContent=(round>=ROUNDS_TOTAL)?"🏁 최종 결과":"다음 라운드 →";
    }
    function nextRound(){ round++; if(round>ROUNDS_TOTAL){ showFinal(); return; } beginSearch(); }
    function showFinal(){
      document.getElementById("finalTotal").textContent=fmtNum(total)+" 점";
      var ul=document.getElementById("finalList"); ul.innerHTML="";
      results.forEach(function(r,i){
        var li=document.createElement("li");
        li.innerHTML="<b>R"+(i+1)+"</b> <span>"+fmtNum(r.score)+"점 <span class='d'>("+fmtDist(r.km)+")</span></span>";
        ul.appendChild(li);
      });
      document.getElementById("submitMsg").textContent="";
      document.getElementById("submitBtn").disabled=false;
      document.getElementById("final").style.display="flex";
    }
    function startGame(){
      round=0; total=0; results=[]; scorePill.textContent="총점 0";
      document.getElementById("final").style.display="none";
      document.getElementById("start").style.display="none";
      nextRound();
    }

    // ===== 점수 저장 =====
    function submitScore(){
      var nick=document.getElementById("nickInput").value.trim();
      var st=document.getElementById("submitMsg");
      if(nick.length<1){ st.textContent="닉네임을 입력하세요."; return; }
      var btn=document.getElementById("submitBtn");
      btn.disabled=true; st.textContent="저장 중…";
      sb.from("scores").insert({
        nickname:nick, score:total, scope:level, region:activeName, week:isoWeek(new Date())
      }).then(function(res){
        if(res.error){ st.textContent="저장 실패: "+res.error.message; btn.disabled=false; console.error(res.error); }
        else { st.textContent="✅ 등록 완료! ("+activeName+" · "+isoWeek(new Date())+")"; }
      });
    }

    naver.maps.Event.addListener(pano,"pano_status",function(status){
      if(phase!=="SEARCHING") return;
      if(status==="OK"){ answerCoord=pano.getLocation().coord; startGuessing(); }
      else if(tries<TRIES_MAX){ tryFind(); }
      else { msg.style.background="#e67e22"; msg.textContent="😅 이 지역에서 거리뷰를 못 찾았어요. 다시 시도!";
        msg.style.display="block"; phase="RETRY"; act.disabled=false; act.textContent="🎲 다시 시도"; }
    });
    naver.maps.Event.addListener(guessMap,"click",function(e){
      if(phase!=="GUESSING") return;
      guessLatLng=e.coord;
      if(guessMarker) guessMarker.setPosition(guessLatLng); else guessMarker=labelMarker(guessLatLng,"내 추측","#2563eb");
      act.disabled=false;
    });
    act.addEventListener("click",function(){
      if(phase==="GUESSING") reveal();
      else if(phase==="REVEALED") nextRound();
      else if(phase==="RETRY") beginSearch();
    });
    document.getElementById("expandBtn").addEventListener("click",function(){
      var p=document.getElementById("panel"); p.classList.toggle("big");
      this.textContent=p.classList.contains("big")?"⤡ 작게":"⤢ 크게";
      setTimeout(function(){ window.dispatchEvent(new Event("resize")); },220);
    });
    document.getElementById("submitBtn").addEventListener("click",submitScore);
    document.getElementById("againBtn").addEventListener("click",function(){
      document.getElementById("final").style.display="none";
      document.getElementById("start").style.display="flex";
    });

    // ===== 시작 화면 =====
    var level="all", provSel=document.getElementById("provSel"), muniSel=document.getElementById("muniSel");
    document.getElementById("seg").addEventListener("click",function(e){
      if(e.target.tagName!=="BUTTON") return;
      [].forEach.call(this.children,function(b){ b.classList.remove("on"); });
      e.target.classList.add("on"); level=e.target.dataset.lv;
      provSel.style.display=(level==="all")?"none":"block";
      muniSel.style.display="none";
      if(level==="sigungu"){ fillMuni(); muniSel.style.display="block"; }
    });
    provSel.addEventListener("change",function(){ if(level==="sigungu") fillMuni(); });
    function fillMuni(){
      var pc=provSel.value; muniSel.innerHTML="";
      DATA.municipalities.filter(function(m){return m.pcode===pc;})
        .forEach(function(m){ var o=document.createElement("option"); o.value=m.code; o.textContent=m.name; muniSel.appendChild(o); });
    }
    document.getElementById("startBtn").addEventListener("click",function(){
      if(!DATA) return;
      if(level==="all"){ activeFeatures=DATA.municipalities; activeName="전국"; }
      else if(level==="sido"){
        activeFeatures=DATA.municipalities.filter(function(m){return m.pcode===provSel.value;});
        activeName=provSel.options[provSel.selectedIndex].text;
      } else {
        var c=muniSel.value; activeFeatures=DATA.municipalities.filter(function(m){return m.code===c;});
        activeName=muniSel.options[muniSel.selectedIndex].text;
      }
      activeBBox=combinedBBox(activeFeatures);
      var sw=new naver.maps.LatLng(activeBBox[1],activeBBox[0]);
      var ne=new naver.maps.LatLng(activeBBox[3],activeBBox[2]);
      cutoffKm=Math.max(3, haversineKm(sw,ne)*CUTOFF_FRAC);
      startGame();
    });

    fetch("regions.json").then(function(r){return r.json();}).then(function(d){
      DATA=d;
      d.provinces.forEach(function(p){ var o=document.createElement("option"); o.value=p.code; o.textContent=p.name; provSel.appendChild(o); });
      document.getElementById("startBtn").textContent="게임 시작 ▶";
    }).catch(function(err){
      document.getElementById("startBtn").textContent="⚠️ 오류: "+err.message;
      console.error("regions.json 로드 실패:", err);
    });
  </script>
</body>
</html>
